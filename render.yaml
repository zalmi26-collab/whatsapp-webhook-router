services:
  - type: web
    name: whatsapp-webhook-router
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ROUTES_JSON
        sync: false
      - key: DEFAULT_ROUTE
        sync: false
